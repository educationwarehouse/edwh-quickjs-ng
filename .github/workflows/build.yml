name: Build wheels

on:
  push:
    tags:
      - "v*"

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches project version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python3 -c "import re, pathlib; print(re.search(r'^version = \"(.+?)\"$', pathlib.Path('pyproject.toml').read_text(), re.M).group(1))")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag version ($TAG) does not match pyproject version ($VERSION)"
            exit 1
          fi

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            cibw_archs: x86_64
          - os: ubuntu-latest
            arch: i686
            cibw_archs: i686
            cibw_manylinux_image: manylinux_2_28
          - os: ubuntu-latest
            arch: aarch64
            cibw_archs: aarch64
            cibw_manylinux_image: manylinux_2_28
          - os: windows-latest
            arch: x86_64
            cibw_archs: AMD64
          - os: windows-latest
            arch: i686
            cibw_archs: x86
          - os: macos-14
            arch: arm64
            cibw_archs: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_MANYLINUX_I686_IMAGE: ${{ matrix.cibw_manylinux_image && format('quay.io/pypa/{0}_i686', matrix.cibw_manylinux_image) || '' }}
          CIBW_MANYLINUX_AARCH64_IMAGE: ${{ matrix.cibw_manylinux_image && format('quay.io/pypa/{0}_aarch64', matrix.cibw_manylinux_image) || '' }}

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
